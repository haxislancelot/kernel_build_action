name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/ata-kaner/android_kernel_samsung_sm8250.git
          kernel-branch: lineage-22.2
          config: vendor/samsung/r8q.config
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          android-version: 14
          aosp-clang-version: r450784d
          anykernel3: true
